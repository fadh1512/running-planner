services:
  - type: web
    name: running-planner-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: running-planner-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false

databases:
  - name: running-planner-db
    plan: free
    databaseName: running_planner
